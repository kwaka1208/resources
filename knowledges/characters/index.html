<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>プログラミングでよく使う記号一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../shared/toast.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-12">
      <header class="mb-12 text-center">
        <h1
          class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4 tracking-tight"
        >
          プログラミングでよく使う記号一覧
        </h1>
        <p class="text-gray-600 max-w-2xl mx-auto">
          プログラミングで頻繁に使用される（けれど一般に馴染みの薄い）記号の読み方、用途、そしてキーボード（日本語JIS
          / 英語US）での入力方法をまとめました。<br class="hidden md:block" />
          <span
            class="text-sm bg-blue-100 text-blue-800 px-2 py-1 rounded mt-2 inline-block"
            >💡 記号をクリックするとコピーできます</span
          >
        </p>
      </header>

      <div
        id="symbols-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <!-- JavaScriptで動的に生成されます -->
      </div>

      <footer
        class="mt-16 text-center text-sm text-gray-500 border-t pt-8 pb-4"
      >
        <p>
          ※キーボードの種類やOS（Windows /
          Mac）によって一部入力方法が異なる場合があります。
        </p>
      </footer>
    </div>

    <div
      id="toast"
      class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded shadow-lg z-50 text-sm font-medium"
    >
      コピーしました！
    </div>

    <script src="../shared/toast.js"></script>
    <script src="main.js"></script>
  </body>
</html>
